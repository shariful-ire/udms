<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{% block title %}University Dining Management System{% endblock %}</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #f4f6f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #1a1d23;
    }
    .wrapper {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .card {
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    /* Header */
    .header {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      padding: 32px 40px;
      text-align: center;
    }
    .header .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      text-decoration: none;
    }
    .header .logo-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    /* Body */
    .body {
      padding: 40px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    p {
      color: #475569;
      margin-bottom: 16px;
      line-height: 1.7;
    }
    /* OTP box */
    .otp-box {
      background: #f1f5f9;
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      margin: 28px 0;
    }
    .otp-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: #64748b;
      margin-bottom: 8px;
    }
    .otp-code {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 12px;
      color: #2563eb;
      font-family: 'Courier New', Courier, monospace;
    }
    .otp-expiry {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 8px;
    }
    /* CTA button */
    .btn {
      display: inline-block;
      background: #2563eb;
      color: #ffffff !important;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      margin: 8px 0;
    }
    .btn:hover { background: #1d4ed8; }
    /* Alert */
    .alert {
      background: #fef3c7;
      border-left: 4px solid #f59e0b;
      border-radius: 6px;
      padding: 14px 16px;
      margin: 20px 0;
      color: #92400e;
      font-size: 14px;
    }
    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 28px 0;
    }
    /* Footer */
    .footer {
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      padding: 24px 40px;
      text-align: center;
    }
    .footer p {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .footer a {
      color: #2563eb;
      text-decoration: none;
    }
    /* Info list */
    .info-list {
      list-style: none;
      margin: 16px 0;
    }
    .info-list li {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      font-size: 14px;
      color: #475569;
    }
    .info-list li::before {
      content: "•";
      color: #2563eb;
      font-weight: 700;
      flex-shrink: 0;
    }
    @media only screen and (max-width: 600px) {
      .body { padding: 24px 20px; }
      .header { padding: 24px 20px; }
      .otp-code { font-size: 32px; letter-spacing: 8px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <!-- Header -->
      <div class="header">
        <span class="logo">
          <span class="logo-icon">🍽</span>
          UDMS
        </span>
      </div>

      <!-- Content -->
      <div class="body">
        {% block content %}{% endblock %}
      </div>

      <!-- Footer -->
      <div class="footer">
        <p>University Dining Management System</p>
        <p>This is an automated message — please do not reply to this email.</p>
        <p style="margin-top:8px;">
          <a href="#">Privacy Policy</a> &nbsp;·&nbsp;
          <a href="#">Help & Support</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
